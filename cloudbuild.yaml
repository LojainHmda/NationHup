# Google Cloud Build - Cloud Run deployment
# Usage:
#   gcloud builds submit --config cloudbuild.yaml . \
#     --substitutions="_SERVICE_NAME=shoestockpro,_REGION=us-central1,_DATABASE_URL=postgresql://..."
#
# With Neon PostgreSQL (same DB as local):
#   gcloud builds submit --config cloudbuild.yaml . \
#     --substitutions="_SERVICE_NAME=shoestockpro,_REGION=us-central1,_DATABASE_URL=postgresql://user:pass@host.neon.tech/db?sslmode=require"

substitutions:
  _SERVICE_NAME: 'shoestockpro'
  _REGION: 'us-central1'
  _DATABASE_URL: ''
  _SESSION_SECRET: ''   # Optional: pass to reuse existing sessions; omit to auto-generate
  _CLOUD_SQL_INSTANCE: ''

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        set -e
        if [ -n "${_SESSION_SECRET}" ]; then
          SESSION_SECRET="${_SESSION_SECRET}"
        else
          SESSION_SECRET=$$(openssl rand -hex 32)
        fi
        # Use env file (map format) to handle special chars in DATABASE_URL
        {
          echo "SESSION_SECRET: \"$$SESSION_SECRET\""
          echo "SESSION_SECURE: \"true\""
          echo "NODE_ENV: \"production\""
          if [ -n "${_DATABASE_URL}" ]; then
            echo "DATABASE_URL: \"${_DATABASE_URL}\""
          fi
        } > /tmp/env.yaml
        CMD="gcloud run deploy ${_SERVICE_NAME} \
          --image gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 2 \
          --no-cpu-throttling \
          --timeout 300 \
          --max-instances 10 \
          --min-instances 0 \
          --env-vars-file /tmp/env.yaml"
        if [ -n "${_CLOUD_SQL_INSTANCE}" ]; then
          CMD="$$CMD --add-cloudsql-instances ${_CLOUD_SQL_INSTANCE}"
        fi
        eval $$CMD

images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
